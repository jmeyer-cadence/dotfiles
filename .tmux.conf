# Remap prefix from Ctrl-b to Ctrl-Space
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Start window/pane numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Open new panes in the current working directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Keep mouse selections active until copy mode exits.
set -g mouse on
set -s copy-command 'pbcopy'
unbind -T copy-mode MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
unbind -T copy-mode C-c
unbind -T copy-mode-vi C-c
bind -T root DoubleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-word }
bind -T root TripleClick1Pane select-pane -t = \; if-shell -F "#{||:#{pane_in_mode},#{mouse_any_flag}}" { send-keys -M } { copy-mode -H ; send-keys -X select-line }
bind -T copy-mode DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode-vi DoubleClick1Pane select-pane \; send-keys -X select-word
bind -T copy-mode TripleClick1Pane select-pane \; send-keys -X select-line
bind -T copy-mode-vi TripleClick1Pane select-pane \; send-keys -X select-line
bind -T copy-mode Enter send-keys -X copy-pipe-no-clear
bind -T copy-mode-vi Enter send-keys -X copy-pipe-no-clear
bind -T copy-mode M-c send-keys -X copy-pipe-no-clear
bind -T copy-mode-vi M-c send-keys -X copy-pipe-no-clear

# Increase scrollback buffer
set -g history-limit 10000

# Use 256 colors
set -g default-terminal "screen-256color"


# Dim inactive panes
set -g window-style 'bg=colour236'
set -g window-active-style 'bg=colour234'

# Pane borders
set -g pane-active-border-style 'fg=green'
set -g pane-border-style 'fg=colour238'

# Window status format — workmux injects @workmux_status; we own structure and style
set -g window-status-format ' #I:#W#{?@workmux_status, #{@workmux_status},}#{?window_flags,#{window_flags}, } '
set -g window-status-current-format ' #I:#W#{?@workmux_status, #{@workmux_status},} '
set -g window-status-current-style 'fg=brightwhite,bg=blue'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto-restore sessions on tmux server start
set -g @continuum-restore 'on'

# Resume Claude sessions on restore using per-pane session mapping
set -g @resurrect-processes '"~claude->~/.claude/hooks/claude_restore"'

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
