# Remap prefix from Ctrl-b to Ctrl-Space
unbind C-b
set-option -g prefix C-Space
bind-key C-Space send-prefix

# Start window/pane numbering at 1 (matches keyboard layout)
set -g base-index 1
setw -g pane-base-index 1
set-option -g renumber-windows on

# Open new panes in the current working directory
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Enable mouse support
set -g mouse on
bind -T copy-mode    MouseDragEnd1Pane send-keys -X copy-selection-no-clear
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-no-clear

# Increase scrollback buffer
set -g history-limit 10000

# Use 256 colors
set -g default-terminal "screen-256color"

# Highlight active window in status bar
set -g window-status-current-style 'fg=brightwhite,bg=blue'
set -g window-status-current-format ' #I:#W '
